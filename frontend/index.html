<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🟢 Favicon (logo hiển thị trên tab, tìm kiếm Google, Facebook...) -->
    <link rel="icon" type="image/png" href="/frontend/public/logo-greenweave.png?v=2" />
    <link rel="apple-touch-icon" href="/frontend/public/logo-greenweave.png?v=2" />
    <link rel="shortcut icon" href="/frontend/public/logo-greenweave.png?v=2" />

    <!-- 🟢 Title hiển thị trên tab trình duyệt và kết quả tìm kiếm -->
    <title>GreenWeave - Túi Thân Thiện Môi Trường</title>

    <!-- 🟢 Mô tả SEO (hiển thị dưới link khi tìm trên Google) -->
    <meta
      name="description"
      content="GreenWeave - Cửa hàng túi xách thân thiện môi trường, bền vững và thời trang. Sản phẩm làm từ vật liệu tái chế, hướng tới phong cách sống xanh."
    />

    <!-- 🟢 Từ khóa hỗ trợ SEO -->
    <meta
      name="keywords"
      content="GreenWeave, túi xách, thân thiện môi trường, túi bền vững, thời trang xanh, eco bag, túi tái chế, sustainable fashion"
    />

    <!-- 🟢 Thẻ Open Graph (Facebook, Zalo, khi share link) -->
    <meta property="og:title" content="GreenWeave - Túi Thân Thiện Môi Trường" />
    <meta
      property="og:description"
      content="Khám phá bộ sưu tập túi thân thiện môi trường từ GreenWeave — bền vững, trẻ trung và thời trang."
    />
    <meta property="og:image" content="/frontend/public/logo-greenweave.png?v=2" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://greenweave.vn" />

    <!-- 🟢 Thẻ Twitter Card (hiển thị đẹp khi share lên X/Twitter) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GreenWeave - Túi Thân Thiện Môi Trường" />
    <meta
      name="twitter:description"
      content="Cửa hàng túi thân thiện môi trường, bền vững và thời trang."
    />
    <meta name="twitter:image" content="/frontend/public/logo-greenweave.png?v=2" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
